<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard — Face ID Attendance{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#1e293b',
                        border: '#334155',
                        muted: '#94a3b8',
                        primary: '#f1f5f9',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"IBM Plex Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 8px; color: #94a3b8; font-size: 0.9rem; font-weight: 500; transition: all 0.15s; text-decoration: none; }
        .sidebar-link:hover { background: #334155; color: #f1f5f9; }
        .sidebar-link.active { background: #f59e0b22; color: #f59e0b; }
        .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
        .badge-present { background: #166534; color: #4ade80; }
        .badge-late { background: #78350f; color: #fbbf24; }
        .badge-absent { background: #7f1d1d; color: #f87171; }
        .badge-incomplete { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .badge-sent { background: #0c4a6e; color: #38bdf8; }
        .badge-unsent { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .badge-came { background: #166534; color: #4ade80; }
        .badge-gone { background: #7f1d1d; color: #f87171; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 16px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; border-bottom: 1px solid #334155; }
        td { padding: 12px 16px; font-size: 0.875rem; border-bottom: 1px solid #1e293b; }
        tr:hover td { background: #1e293b44; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        input, select { background: #0f172a; border: 1px solid #334155; color: #f1f5f9; padding: 8px 12px; border-radius: 8px; font-size: 0.875rem; outline: none; }
        input:focus, select:focus { border-color: #f59e0b; }
        .btn { padding: 8px 16px; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
        .btn-primary { background: #f59e0b; color: #0f172a; }
        .btn-primary:hover { background: #d97706; }
        .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .btn-secondary:hover { color: #f1f5f9; border-color: #94a3b8; }
        .btn-danger { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; }
        .btn-danger:hover { background: #991b1b; }
        .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px 24px; }
        .stat-value { font-size: 2rem; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
        .stat-label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex">
    <aside style="width: 240px; background: #1e293b; border-right: 1px solid #334155; padding: 24px 16px; display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 10;">
        <div style="padding: 0 8px 24px; border-bottom: 1px solid #334155; margin-bottom: 16px;">
            <div style="font-size: 1rem; font-weight: 700; color: #f59e0b; font-family: 'IBM Plex Mono', monospace;">⬡ FaceID</div>
            <div style="font-size: 0.7rem; color: #64748b; margin-top: 2px;">Attendance System</div>
        </div>
        <nav style="display: flex; flex-direction: column; gap: 4px; flex: 1;">
            <a href="{% url 'dashboard-index' %}" class="sidebar-link {% block nav_index %}{% endblock %}">
                <span>📊</span> Overview
            </a>
            <a href="{% url 'dashboard-employees' %}" class="sidebar-link {% block nav_employees %}{% endblock %}">
                <span>👥</span> Employees
            </a>
            <a href="{% url 'dashboard-attendance' %}" class="sidebar-link {% block nav_attendance %}{% endblock %}">
                <span>📋</span> Attendance Log
            </a>
            <a href="{% url 'dashboard-shifts' %}" class="sidebar-link {% block nav_shifts %}{% endblock %}">
                <span>🕐</span> Shifts
            </a>
            <a href="{% url 'dashboard-reports' %}" class="sidebar-link {% block nav_reports %}{% endblock %}">
                <span>📤</span> Reports
            </a>
        </nav>
        <div style="border-top: 1px solid #334155; padding-top: 16px; margin-top: 16px;">
            <a href="/admin/" class="sidebar-link" style="font-size: 0.8rem;">
                <span>⚙️</span> Django Admin
            </a>
        </div>
    </aside>

    <div style="margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh;">
        <header style="background: #1e293b; border-bottom: 1px solid #334155; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 9;">
            <div style="font-size: 0.875rem; color: #94a3b8;">
                {% block breadcrumb %}Dashboard{% endblock %}
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <span style="font-size: 0.875rem; color: #94a3b8;">
                    {{ request.user.username }}
                </span>
                <form method="post" action="{% url 'dashboard-logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-secondary" style="font-size: 0.8rem; padding: 6px 12px;">
                        Chiqish
                    </button>
                </form>
            </div>
        </header>

        <main style="flex: 1; padding: 32px;">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
